<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轻量化通用需求采集工具</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 顶部标题栏 ===== -->
  <header class="app-header">
    <h1 class="app-title">📋 轻量化通用需求采集工具</h1>
    <p class="app-subtitle">标准化办公自动化项目需求采集 · 一键生成客户确认书 + Claude Code 开发文本</p>
  </header>

  <!-- ===== 步骤指示器 ===== -->
  <nav class="step-indicator" id="stepIndicator">
    <div class="step" data-step="selectTemplate">
      <div class="step-circle">1</div>
      <span class="step-label">选择模板</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="basicInfo">
      <div class="step-circle">2</div>
      <span class="step-label">基础信息</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="existingProcess">
      <div class="step-circle">3</div>
      <span class="step-label">现有流程</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="automationGoal">
      <div class="step-circle">4</div>
      <span class="step-label">自动化目标</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="dataSpec">
      <div class="step-circle">5</div>
      <span class="step-label">数据规范</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="constraints">
      <div class="step-circle">6</div>
      <span class="step-label">约束限制</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="specialScenarios">
      <div class="step-circle">7</div>
      <span class="step-label">特殊场景</span>
    </div>
    <div class="step-connector"></div>
    <div class="step" data-step="preview">
      <div class="step-circle">8</div>
      <span class="step-label">预览确认</span>
    </div>
  </nav>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content" id="mainContent">
    <!-- 由 JS 动态渲染 -->
  </main>

  <!-- ===== 底部导航栏 ===== -->
  <footer class="app-footer">
    <div class="footer-left">
      <button class="btn btn-outline" id="btnReset" title="清空所有数据，重新开始">
        🔄 重新开始
      </button>
    </div>
    <div class="footer-center">
      <span class="save-indicator" id="saveIndicator">💾 已自动保存</span>
    </div>
    <div class="footer-right">
      <button class="btn btn-outline" id="btnPrev" disabled>← 上一步</button>
      <button class="btn btn-primary" id="btnNext">下一步 →</button>
    </div>
  </footer>

  <!-- ===== 确认对话框（隐藏） ===== -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box">
      <h3 class="modal-title" id="modalTitle"></h3>
      <p class="modal-message" id="modalMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="modalCancel">取消</button>
        <button class="btn btn-danger" id="modalConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast 提示（隐藏） ===== -->
  <div class="toast" id="toast" style="display:none;"></div>

  <!-- ===== JS 文件（按依赖顺序加载） ===== -->
  <script src="js/db.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/form-renderer.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/document-generator.js"></script>
  <script src="js/dev-prompt-generator.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
